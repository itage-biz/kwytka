name: Build and publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags and labels
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: mjr27/kwytka
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-,format=short
            type=match,pattern=v(.*),group=1

      - name: Generate application version
        id: app-version
        uses: docker/metadata-action@v5
        with:
          images: mjr27/kwytka
          tags: |
            type=match,pattern=v(.*),group=1,priority=900
            type=sha,prefix=0.0.0-sha.,format=short,priority=800
            type=raw,value=0.0.0-dev,priority=100

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.app-version.outputs.version }}
